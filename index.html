<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FATBOK TV | Next-Gen Experience</title>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body class="aurora-bg">

    <div class="top-overlay">
        <div class="brand">
            <div class="neon-dot"></div>
            FATBOK<span>TV</span>
        </div>
        <div class="active-info">
            <span id="current-channel-title">Sinyal Bekleniyor...</span>
            <div class="live-tag">LIVE</div>
        </div>
        <div class="top-actions">
            <button onclick="toggleCinemaMode()" id="cinema-btn" title="Sinema Modu">🎥</button>
        </div>
    </div>

    <main class="theater-stage">
        <div id="players" class="dynamic-grid">
            <div class="empty-state">
                <div class="loader-ring"></div>
                <p>YAYIN BAŞLATMAK İÇİN ALT MENÜDEN SEÇİM YAPIN</p>
            </div>
        </div>
    </main>

    <div class="bottom-dock">
        <div class="dock-header">
            <div class="search-wrapper">
                <input type="text" id="search" placeholder="Kanal veya lig ara..." autocomplete="off">
            </div>
            <div class="layout-selector">
                <button onclick="setLayout(1)" class="l-btn">1</button>
                <button onclick="setLayout(2)" class="l-btn">2</button>
                <button onclick="setLayout(4)" class="l-btn">4</button>
            </div>
        </div>

        <div id="channels" class="horizontal-scroll">
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
