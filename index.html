<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FATBOK TV | Next-Gen Streaming</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body class="nebula-bg">

    <div class="bg-glow"></div>

    <nav class="glass-nav">
        <div class="brand">FATBOK<span>TV</span></div>
        <div class="nav-center">
            <div class="search-box">
                <input type="text" id="search" placeholder="Kanal, lig veya takım ara...">
            </div>
        </div>
        <div class="nav-right">
            <div id="clock">00:00</div>
            <button onclick="toggleCinemaMode()" class="icon-btn">✧</button>
        </div>
    </nav>

    <main class="viewport">
        <div id="players" class="video-canvas">
            <div class="hero-placeholder">
                <h1>HİÇBİR ANI KAÇIRMA</h1>
                <p>Başlamak için aşağıdan bir kanal seçin</p>
            </div>
        </div>
    </main>

    <footer class="dock-container">
        <div class="dock-blur">
            <div class="layout-controls">
                <button onclick="setLayout(1)" title="Tekli">1</button>
                <button onclick="setLayout(2)" title="Düello">2</button>
                <button onclick="setLayout(4)" title="Dörtlü">4</button>
            </div>
            <div class="divider"></div>
            <div id="channels" class="channel-track">
                </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
